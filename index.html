<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MalInventario Móvil - Toma de Inventario</title>

    <!-- PWA & Mobile Optimization -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#001f3f">

    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Styles -->
    <link rel="stylesheet" href="mobile-style.css?v=193">
</head>

<body>
    <div class="mobile-app">
        <!-- Header -->
        <header class="mobile-header">
            <div class="header-content">
                <div class="brand">
                    <i class="fas fa-microchip logo-icon"></i>
                    <span class="logo-text">MalInventario</span>
                </div>
                <div class="header-title">Toma de Inventario</div>
            </div>
            <div class="header-actions">
                <button id="btn-refresh" class="icon-btn" title="Refrescar">
                    <i class="fas fa-sync-alt"></i>
                </button>
                <button id="btn-config" class="icon-btn" title="Configurar">
                    <i class="fas fa-cog"></i>
                </button>
            </div>
        </header>

        <!-- Main Scroll Area -->
        <main class="mobile-main">
            <!-- Form Section (Collapsible / Top) -->
            <section id="form-section" class="form-section">
                <div class="section-header" id="toggle-form">
                    <h3><i class="fas fa-plus-circle"></i> Registrar Nuevo Item</h3>
                    <i class="fas fa-chevron-down toggle-icon"></i>
                </div>
                <div id="asset-form-container" class="form-content hidden">
                    <form id="mobile-asset-form">
                        <div class="form-row-group">
                            <!-- Image Selection / Preview -->
                            <div class="field-group image-picker">
                                <label>Foto del Equipo</label>
                                <div class="img-preview-box" id="mob-preview-box" onclick="document.getElementById('mob-file-input').click()">
                                    <i class="fas fa-camera"></i>
                                    <p>Toca para tomar foto o subir</p>
                                </div>
                                <input type="file" id="mob-file-input" accept="image/*" capture="environment" style="display:none">
                                <button type="button" class="btn-upload-label" onclick="document.getElementById('mob-file-input').click()">
                                    <i class="fas fa-upload"></i> SELECCIONAR DESDE DISPOSITIVO
                                </button>
                            </div>

                            <div class="fields-grid">
                                <div class="field-group">
                                    <label>ID MAL (Auto)</label>
                                    <input type="text" id="mob-id" readonly placeholder="MALXXX">
                                </div>
                                <div class="field-group">
                                    <label>Marca</label>
                                    <select id="mob-brand" required>
                                        <option value="">-- Seleccionar --</option>
                                    </select>
                                </div>
                                <div class="field-group">
                                    <label>Nº de Serie</label>
                                    <input type="text" id="mob-sn" placeholder="Número de serie">
                                </div>
                                <div class="field-group">
                                    <label>Categoría</label>
                                    <select id="mob-cat">
                                        <!-- Dynamic -->
                                    </select>
                                </div>
                                <div class="field-group">
                                    <label>Fecha Compra</label>
                                    <input type="date" id="mob-purchase">
                                </div>
                                <div class="field-group">
                                    <label>Estado</label>
                                    <select id="mob-status">
                                        <!-- Dynamic -->
                                    </select>
                                </div>
                                <div class="field-group">
                                    <label>Asignado a</label>
                                    <select id="mob-assignee">
                                        <option value="">-- Sin Asignar --</option>
                                    </select>
                                </div>
                            </div>

                            <div class="field-group full-width">
                                <label>Enlace Foto (Drive/Dropbox)</label>
                                <input type="text" id="mob-img" placeholder="https://drive.google.com/...">
                            </div>

                            <div class="field-group full-width">
                                <label>Descripción / Specs</label>
                                <textarea id="mob-desc" rows="2" placeholder="Ej: i5, 16GB RAM, SSD 512GB..."></textarea>
                            </div>

                            <button type="submit" id="mob-btn-save" class="btn btn-primary-mobile">
                                <i class="fas fa-save"></i> GUARDAR REGISTRO
                            </button>
                            <button type="button" id="mob-btn-cancel" class="btn btn-secondary-mobile hidden">
                                <i class="fas fa-times"></i> CANCELAR EDICIÓN
                            </button>
                        </div>
                    </form>
                </div>
            </section>

            <!-- Search & Filters -->
            <section class="filters-section">
                <div class="search-bar">
                    <i class="fas fa-search"></i>
                    <input type="text" id="mob-search" placeholder="ID, Marca, Serie...">
                </div>
                <div class="category-filter">
                    <select id="mob-filter-cat">
                        <option value="">-- Todas las Categorías --</option>
                    </select>
                </div>
            </section>

            <!-- Inventory List -->
            <section class="inventory-section">
                <div class="list-stats">
                    <span id="items-count">Cargando...</span>
                </div>
                <div id="mob-inventory-list" class="inventory-list">
                    <!-- Cards will be injected here -->
                    <div class="loader-container">
                        <div class="spinner"></div>
                        <p>Sincronizando con Airtable...</p>
                    </div>
                </div>
            </section>
        </main>

        <!-- Notification Toast -->
        <div id="mob-toast" class="toast hidden"></div>

        <!-- Fixed Bottom Bar -->
        <div class="bottom-nav">
            <button class="btn-scroll-top" onclick="document.querySelector('.mobile-main').scrollTo({top: 0, behavior: 'smooth'})">
                <i class="fas fa-arrow-up"></i> VOLVER AL INICIO
            </button>
        </div>
    </div>

    <!-- Modals -->
    <div id="mob-modal-overlay" class="modal-overlay-mobile hidden">
        <div class="modal-mobile">
            <div class="modal-header">
                <h2 id="mob-modal-title">Configuración</h2>
                <button id="close-mob-modal" class="close-btn">&times;</button>
            </div>
            <div id="mob-modal-body" class="modal-body">
                <!-- Generic body -->
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="mobile-script.js?v=195"></script>
</body>

</html>
